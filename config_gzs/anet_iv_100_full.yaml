# This is an updated config for using I3D on ActivtyNet, resulting in slightly
# better performance. To reproduce the setting in our paper, set
# max_seq_len: 160,
# n_mha_win_size: [11, 11, 11, 11, -1, -1],

dataset_name: anet
train_split: ['train']
val_split: ['val']
description_file_path: ./data/anet13/ActivityNet13_description_v6.json
dataset: {
  json_file: ./data/anet13/anet1.3_clip_filtered.json,
  feat_folder: /data/qianyihao/Datasets/ActivityNet13/InternVideo_feat_16frames,
  file_prefix: ~,
  file_ext: .npy,
  num_classes: 200,
  input_dim: 768,
  feat_stride: 16,
  num_frames: 8,
  trunc_thresh: 0.5,
  crop_ratio: [0.9, 1.0],
  # upsample the features to a fixed length of 192
  max_seq_len: 192,
  force_upsampling: True,

  ## New Set for GZS-TAL
  subset_file: "./splits/train_{r1}_test_{r2}/ActivityNet/{mode}/split_{r3}.list", 
  data_split: 100, 
  split_num: 0, 
  task: close_set, # ['close_set', 'zero_shot', 'gzs', ]
  train_num_classes: 200, 
  test_num_classes: 200, 
}
devices: ['cuda:0']  # 添加此行指定使用 cuda:6
model: {
  fpn_type: identity,
  max_buffer_len_factor: 1.0,
  # 192 - 96 - 48 - 24 - 12 - 6
  n_mha_win_size: [7, 7, 7, 7, 7, -1],
  n_head: 4,
  embd_dim: 768,
  fpn_dim: 768,
  head_dim: 768,
  use_abs_pe: True,
}
opt: {
  learning_rate: 0.001,
  epochs: 40,
  weight_decay: 0.05,
}
loader: {
  batch_size: 16,
}
train_cfg: {
  init_loss_norm: 200,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
  label_smoothing: 0.1,
  droppath: 0.1,
  loss_weight: 2.0,
}

# similar to THUMOS
test_cfg: {
  voting_thresh: 0.9,
  pre_nms_topk: 2000,
  # max of 100 predictions per video
  max_seg_num: 100,
  min_score: 0.001,
  # score fusion
  multiclass_nms: False,
  nms_sigma : 0.75,
  #ext_score_file: /data-store/zengrh/qianyihao/Ego/Datasets/anet_1.3_i3d/anet_1.3/annotations/cuhk_val_simp_share.json,
  duration_thresh: 0.001,
}
output_folder: ./ckpt/zs_tal/
